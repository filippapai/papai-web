<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filip Papai – osobní kontakt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a1a;
      --muted: #6e6257;
      --accent: #a67c3c;
      --paper: #f5f1e9;
      --shadow: rgba(20, 20, 20, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      font-family: 'Manrope', 'Segoe UI', Arial, sans-serif;
      background:
        radial-gradient(900px 300px at 10% 0%, #efe6d6 0%, transparent 60%),
        radial-gradient(700px 260px at 90% 20%, #f0e5d7 0%, transparent 55%),
        linear-gradient(180deg, #f8f4ee, #efe6d6);
      color: var(--ink);
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 20px;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(166, 124, 60, 0.25);
      box-shadow: 0 30px 80px var(--shadow);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(6px);
      text-align: left;
      animation: rise 700ms ease-out;
    }
    .eyebrow {
      font-size: 0.85em;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2.2em, 4vw, 3.2em);
      margin: 0 0 12px 0;
      font-weight: 600;
    }
    .intro {
      font-size: 1.1em;
      line-height: 1.7;
      color: var(--muted);
      margin: 0 0 28px 0;
    }
    .contact {
      display: grid;
      gap: 12px;
      font-size: 1.05em;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .label {
      font-size: 0.85em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      min-width: 64px;
    }
    a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }
    a:hover {
      border-bottom-color: var(--accent);
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(166, 124, 60, 0.5), transparent);
      margin: 24px 0;
    }
    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @media (max-width: 600px) {
      .card {
        padding: 36px 26px;
      }
      .contact-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Filip Papai</h1>
    <div class="divider"></div>
    <div class="contact">
      <div class="contact-item">
        <span class="label">Email</span>
        <a href="mailto:filip@papai.cz">filip@papai.cz</a>
      </div>
      <div class="contact-item">
        <span class="label">Telefon</span>
        <a href="tel:+420602727446">+420 602 727 446</a>
      </div>
    </div>
  </main>
</body>
</html>
